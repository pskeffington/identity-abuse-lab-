name: artifact-build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  artifact-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run lint
        run: ruff check src tests

      - name: Generate synthetic telemetry
        run: python -m identity_abuse_lab generate

      - name: Export scored events
        run: PYTHONPATH=src python scripts/export_scored_events.py

      - name: Verify expected results
        run: PYTHONPATH=src:. python scripts/verify_expected_results.py

      - name: Generate figures
        run: PYTHONPATH=src MPLBACKEND=Agg python scripts/generate_figures.py

      - name: Assemble manuscript
        run: PYTHONPATH=src python scripts/assemble_manuscript.py

      - name: Build polished deliverables
        run: PYTHONPATH=src python scripts/build_polished_deliverable.py

      - name: Upload polished report DOCX
        uses: actions/upload-artifact@v4
        with:
          name: polished-report-docx
          path: paper/polished/Identity_Abuse_Lab_Polished_Report.docx
          if-no-files-found: error

      - name: Upload polished report PDF
        uses: actions/upload-artifact@v4
        with:
          name: polished-report-pdf
          path: paper/polished/Identity_Abuse_Lab_Polished_Report.pdf
          if-no-files-found: error

      - name: Upload polished deliverable package
        uses: actions/upload-artifact@v4
        with:
          name: polished-deliverable-package
          path: paper/polished/Identity_Abuse_Lab_Polished_Deliverable.zip
          if-no-files-found: error

      - name: Upload synthetic telemetry
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-telemetry
          path: data/synthetic/*.jsonl
          if-no-files-found: error

      - name: Upload scored event export
        uses: actions/upload-artifact@v4
        with:
          name: scored-events
          path: data/processed/scored_events.csv
          if-no-files-found: error

      - name: Upload paper figures
        uses: actions/upload-artifact@v4
        with:
          name: paper-figures
          path: paper/figures/*.png
          if-no-files-found: error

      - name: Upload assembled manuscript
        uses: actions/upload-artifact@v4
        with:
          name: manuscript
          path: paper/manuscript_assembled.md
          if-no-files-found: error
