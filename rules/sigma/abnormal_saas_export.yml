title: Abnormal SaaS Export Volume
id: 4d0d8ef4-1fd4-4e9f-9a61-identity-abuse-lab-004
status: experimental
description: Detects high-volume SaaS export events in the synthetic identity abuse lab.
author: Paul Skeffington
references:
  - https://github.com/pskeffington/identity-abuse-lab-
date: 2026/05/25
tags:
  - attack.collection
  - attack.exfiltration
  - attack.t1213
logsource:
  product: identity-abuse-lab
  service: saas
  category: export
detection:
  selection:
    event_type: saas_export
  high_volume:
    object_count|gte: 500
  condition: selection and high_volume
fields:
  - user_id
  - timestamp
  - source
  - event_type
  - ip_address
  - object_count
falsepositives:
  - Approved legal discovery export
  - Administrative backup
  - Bulk migration
level: high
